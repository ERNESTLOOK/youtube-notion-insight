name: Daily YouTube Check

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 오전 8시 KST (UTC 23:00)
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write YouTube cookies
        if: ${{ secrets.YOUTUBE_COOKIES != '' }}
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run daily check
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_CHANNEL_DB_ID: ${{ secrets.NOTION_CHANNEL_DB_ID }}
          NOTION_INSIGHT_DB_ID: ${{ secrets.NOTION_INSIGHT_DB_ID }}
          NOTION_TREND_PARENT_ID: ${{ secrets.NOTION_TREND_PARENT_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_COOKIE_PATH: cookies.txt
          NOTION_DASHBOARD_ID: ${{ secrets.NOTION_DASHBOARD_ID }}
        run: python -m src.daily_check
